<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login - Doce História</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <main class="container">

        <section class="left">

            <h1>Doce História</h1>

            <p>

                Entre na sua conta e continue vivendo experiências doces conosco

            </p>

        </section>

        <section class="right">

            <div class="form-box">

                <h2>Login</h2>

                <p class="subtitle">

                    Acesse sua conta

                </p>

                <form action="index.html">

                    <div class="input-group">

                        <label for="email">

                            E-mail

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="email"
                                placeholder="Digite seu e-mail"
                                required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label for="senha">

                            Senha

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="senha"
                                placeholder="Digite sua senha"
                                required>

                        </div>

                    </div>

                    <div class="checkbox">

                        <input
                            type="checkbox"
                            id="lembrar">

                        <label for="lembrar">

                            Lembrar de mim

                        </label>

                    </div>

                    <button
                        type="submit"
                        class="btn">

                        Entrar

                    </button>

                </form>

                <div class="login-link">

                    Ainda não possui conta?

                    <a href="cadastro.html">

                        Criar conta

                    </a>

                </div>

                <div class="social">

                    <a href="https://www.instagram.com/docehistoriacp/" target="_blank">

                        <i class="fa-brands fa-instagram"></i>

                    </a>

                    <a href="http://wa.me/message/LAPDJ3KH7F42D1" target="_blank">

                        <i class="fa-brands fa-whatsapp"></i>

                    </a>

                    <a href="mailto:docehistoriavendas@gmail.com">

                        <i class="fa-solid fa-envelope"></i>

                    </a>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
