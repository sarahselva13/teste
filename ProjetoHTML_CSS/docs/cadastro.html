<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cadastro - Doce História</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="cadastro.css">

</head>

<body>

    <main class="container">

        <section class="left">

            <h1>Doce História</h1>

            <p>

                Crie sua conta e viva experiências doces com a Doce História

            </p>

        </section>

        <section class="right">

            <div class="form-box">

                <h2>Cadastro</h2>

                <p class="subtitle">

                    Preencha seus dados para começar

                </p>

                <form action="login.html">

                    <div class="input-group">

                        <label for="nome">

                            Nome Completo

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-user"></i>

                            <input
                                type="text"
                                id="nome"
                                placeholder="Digite seu nome"
                                required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label for="email">

                            E-mail

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="email"
                                placeholder="Digite seu e-mail"
                                required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label for="telefone">

                            Telefone

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-phone"></i>

                            <input
                                type="tel"
                                id="telefone"
                                placeholder="(43) 99999-9999"
                                required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label for="nascimento">

                            Data de Nascimento

                        </label>

                    <div class="input-box">

                        <i class="fa-solid fa-calendar-days"></i>

                        <input
                            type="date"
                            id="nascimento"
                            required>

                    </div>

                </div>

                    <div class="input-group">

                        <label for="endereco">

                            Endereço

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-location-dot"></i>

                            <input
                                type="text"
                                id="endereco"
                                placeholder="Digite seu endereço"
                                required>

                        </div>

                    </div>

                    <div class="checkbox">

                        <input
                            type="checkbox"
                            id="termos"
                            required>

                        <label for="termos">

                            Aceito os termos de uso e política
                            de privacidade

                        </label>

                    </div>

                    <button
                        type="submit"
                        class="btn">

                        Criar Conta

                    </button>

                </form>

                <div class="login-link">

                    Já possui conta?

                    <a href="login.html">

                        Entrar

                    </a>

                </div>

                <div class="social">

                    <a href="https://www.instagram.com/docehistoriacp/" target="_blank">

                        <i class="fa-brands fa-instagram"></i>

                    </a>

                    <a href="http://wa.me/message/LAPDJ3KH7F42D1" target="_blank">

                        <i class="fa-brands fa-whatsapp"></i>

                    </a>

                    <a href="mailto:docehistoriavendas@gmail.com">

                        <i class="fa-solid fa-envelope"></i>

                    </a>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
